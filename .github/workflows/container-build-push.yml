name: Container Push

on:
  release:
    types: [published]

jobs:
  push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: skill
            file: packages/skill/Containerfile
            image: ghcr.io/${{ github.repository }}-skill
          - name: sync
            file: packages/sync/Containerfile
            image: ghcr.io/${{ github.repository }}-sync
          - name: api
            file: packages/api/Containerfile
            image: ghcr.io/${{ github.repository }}-api
          - name: controller
            file: packages/controller/Containerfile
            image: ghcr.io/${{ github.repository }}-controller

    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - name: Set version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push ${{ matrix.service.name }}
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6
        with:
          context: .
          file: ${{ matrix.service.file }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ matrix.service.image }}:latest
            ${{ matrix.service.image }}:${{ github.sha }}
            ${{ matrix.service.image }}:${{ env.VERSION }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}

name: Helm Chart Release

# Publishes the inky-image-display Helm chart as an OCI artifact to GHCR on
# every root GitHub Release, alongside the container images (see
# container-build-push.yml). The chart lands at
# oci://ghcr.io/<owner>/charts/inky-image-display:<version>.
on:
  release:
    types: [published]

jobs:
  release-chart:
    runs-on: ubuntu-latest
    # Only root releases (v5.6.0) ship the chart — release-please also tags
    # component releases (shared-v*, controller-v*) that have no chart.
    if: startsWith(github.event.release.tag_name, 'v')

    permissions:
      packages: write
      contents: read

    env:
      CHART_DIR: charts/inky-image-display
      # OCI repository the chart is pushed into (chart name is appended by helm).
      OCI_REPO: oci://ghcr.io/${{ github.repository_owner }}/charts

    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - name: Derive version from tag
        # Strip a leading "v": v0.1.0 -> 0.1.0. SemVer is required by OCI/Helm.
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      # helm is pre-installed on GitHub-hosted ubuntu runners (>= 3.8, OCI GA).
      - name: Lint chart
        run: helm lint "$CHART_DIR"

      - name: Package chart
        # Pin both chart version and appVersion to the release so the deployed
        # image tag (which defaults to .Chart.AppVersion) matches the chart.
        run: |
          helm package "$CHART_DIR" \
            --version "$VERSION" \
            --app-version "$VERSION" \
            --destination dist

      - name: Login to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push chart
        run: helm push "dist/inky-image-display-${VERSION}.tgz" "$OCI_REPO"

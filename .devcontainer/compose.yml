services:
  # Development container service
  dev:
    image: ghcr.io/stkr22/devcontainer-python-container:1.5.0@sha256:94c35390676241f49f65561340fc23b59d7db15cdd878ad73a8f459ebae23b2c
    container_name: inky-image-display-dev
    userns_mode: "keep-id"  # Podman: keeps your host UID
    working_dir: /workspaces/inky-image-display
    volumes:
      - ..:/workspaces/inky-image-display:cached,U
    command: sleep infinity
    environment:
      # SQLite database path (shared by API and sync services)
      DATABASE_PATH: /workspaces/inky-image-display/data/inky.db
      API_DATABASE_PATH: /workspaces/inky-image-display/data/inky.db
      # MQTT connection — used by the API to talk to devices.
      API_MQTT_HOST: mosquitto
      API_MQTT_PORT: 1883
      # Controller-side overrides (when running the controller from this
      # container against the local broker / API).
      CONTROLLER_MQTT__HOST: mosquitto
      CONTROLLER_MQTT__PORT: 1883
      CONTROLLER_API__URL: "http://localhost:8000"
      # S3 (Garage) — shared by API, UI, and sync
      API_S3_ENDPOINT: "garage:3900"
      API_S3_BUCKET: inky-images
      API_S3_SECURE: "false"
      API_S3_REGION: garage
      API_S3_WRITER_ACCESS_KEY: GK00112233445566778899aabb
      API_S3_WRITER_SECRET_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      API_S3_READER_ACCESS_KEY: GK00112233445566778899aabb
      API_S3_READER_SECRET_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      UI_API_BASE_URL: "http://api:8000"
      UI_S3_ENDPOINT: "garage:3900"
      UI_S3_BUCKET: inky-images
      UI_S3_SECURE: "false"
      UI_S3_REGION: garage
      UI_S3_READER_ACCESS_KEY: GK00112233445566778899aabb
      UI_S3_READER_SECRET_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      S3_WRITER_ENDPOINT: "garage:3900"
      S3_WRITER_BUCKET: inky-images
      S3_WRITER_SECURE: "false"
      S3_WRITER_REGION: garage
      S3_WRITER_ACCESS_KEY: GK00112233445566778899aabb
      S3_WRITER_SECRET_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
    depends_on:
      - garage
      - mosquitto
    networks:
      - pa-inky-image-display-network

  # MQTT broker used for API ↔ device command/ack/status traffic.
  # Dev-only: anonymous access on 1883, no persistence.
  mosquitto:
    image: docker.io/eclipse-mosquitto:2.0.22
    container_name: inky-image-display-mosquitto
    command: ["mosquitto", "-c", "/mosquitto/config/mosquitto.conf"]
    volumes:
      - ./config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    networks:
      - pa-inky-image-display-network

  # Garage S3-compatible object storage for images.
  # `--single-node` auto-creates a cluster layout on first boot.
  # `--default-access-key` provisions the access key from the GARAGE_DEFAULT_*
  # env vars. `--default-bucket` auto-creates the bucket on boot and grants
  # the default access key read+write access to it.
  garage:
    image: docker.io/dxflrs/garage:v2.3.0
    container_name: inky-image-display-garage
    command: >-
      /garage server --single-node --default-access-key --default-bucket
    environment:
      GARAGE_DEFAULT_ACCESS_KEY: GK00112233445566778899aabb
      GARAGE_DEFAULT_SECRET_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      GARAGE_DEFAULT_BUCKET: inky-images
    volumes:
      - ./config/garage.toml:/etc/garage.toml:ro
      - garage-meta:/var/lib/garage/meta
      - garage-data:/var/lib/garage/data
    networks:
      - pa-inky-image-display-network

volumes:
  garage-meta:
  garage-data:

networks:
  pa-inky-image-display-network:
    driver: bridge

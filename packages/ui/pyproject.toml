[build-system]
requires = ["uv_build>=0.11.6,<0.12"]
build-backend = "uv_build"

[project]
name = "inky-image-display-ui"
version = "0.1.0"
description = "NiceGUI-based web UI for Inky Image Display (images, devices, sync jobs)."
authors = [
    { name = "stkr22", email = "stkr22@github.com" }
]
license = "GPL-3.0-only"
dependencies = [
    "inky-image-display-shared~=3.0",
    "fastapi~=0.135.3",
    "uvicorn[standard]~=0.44.0",
    "httpx~=0.28.1",
    "minio~=7.2.20",
    "pydantic~=2.12.5",
    "pydantic-settings~=2.13.1",
    "nicegui~=3.3",
]

[project.scripts]
inky-image-display-ui = "inky_image_display_ui.main:main"

[tool.uv.sources]
inky-image-display-shared = { workspace = true }

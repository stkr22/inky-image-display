[build-system]
requires = ["uv_build>=0.11.6,<0.12"]
build-backend = "uv_build"

[project]
name = "inky-image-display-api"
version = "0.14.0"
description = "FastAPI service for Inky Image Display device and image management."
authors = [
    { name = "stkr22", email = "stkr22@github.com" }
]
license = "GPL-3.0-only"
dependencies = [
    "inky-image-display-shared~=2.0",
    "fastapi~=0.135.3",
    "uvicorn[standard]~=0.44.0",
    "httpx~=0.28.1",
    "minio~=7.2.20",
    "pydantic~=2.12.5",
    "pydantic-settings~=2.13.1",
    "sqlmodel~=0.0.38",
    "aiosqlite~=0.22.1",
    "alembic~=1.18.4",
    "python-multipart~=0.0.26",
    "pillow~=12.2.0",
    "pillow-heif~=1.3.0",
    "aiomqtt~=2.5.1",
]

[project.scripts]
inky-image-display-api = "inky_image_display_api.main:main"

[tool.uv.sources]
inky-image-display-shared = { workspace = true }

[build-system]
requires = ["uv_build>=0.11.6,<0.12"]
build-backend = "uv_build"

[project]
name = "inky-image-display-api"
version = "0.14.0"
description = "FastAPI service for Inky Image Display device and image management."
authors = [
    { name = "stkr22", email = "stkr22@github.com" }
]
license = "GPL-3.0-only"
requires-python = ">=3.12,<3.14"
dependencies = [
    "inky-image-display-shared",
    "fastapi~=0.135.3",
    "uvicorn~=0.44.0",
    "httpx~=0.28.1",
    "minio~=7.2.20",
    "pydantic~=2.12.5",
    "pydantic-settings~=2.13.1",
    "sqlmodel~=0.0.38",
    "asyncpg~=0.31.0",
    "alembic~=1.18.4",
    "python-multipart~=0.0.26",
]

[project.scripts]
inky-image-display-api = "inky_image_display_api.main:main"

[tool.uv.sources]
inky-image-display-shared = { workspace = true }

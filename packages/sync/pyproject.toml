[build-system]
requires = ["uv_build>=0.11.6,<0.12"]
build-backend = "uv_build"

[project]
name = "inky-image-display-sync"
version = "0.14.0"
description = "Immich image sync service for Inky Image Display."
authors = [
    { name = "stkr22", email = "stkr22@github.com" }
]
license = "GPL-3.0-only"
dependencies = [
    "inky-image-display-shared",
    "typer~=0.24.1",
    "httpx~=0.28.1",
    "minio~=7.2.20",
    "pydantic~=2.12.5",
    "pydantic-settings~=2.13.1",
    "pyyaml~=6.0.3",
    "pillow~=12.2.0",
    "pillow-heif~=1.3.0",
    "coloraide~=8.8.1",
]

[project.scripts]
inky-image-display-sync = "inky_image_display_sync.main:app"

[tool.uv.sources]
inky-image-display-shared = { workspace = true }

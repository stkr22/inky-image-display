[build-system]
requires = ["uv_build>=0.11.6,<0.12"]
build-backend = "uv_build"

[project]
name = "inky-image-display-controller"
version = "4.0.0"
description = "Device-side controller for Inky e-ink picture displays."
authors = [
    { name = "stkr22", email = "stkr22@github.com" }
]
license = "GPL-3.0-only"
dependencies = [
    "inky-image-display-shared~=3.0",
    "aiomqtt~=2.5.1",
    "httpx~=0.28.1",
    "minio~=7.2.20",
    "pillow~=12.2.0",
    "pydantic~=2.12.5",
    "pydantic-settings~=2.13.1",
    "pyyaml~=6.0.3",
    "typer~=0.24.1",
]

[project.optional-dependencies]
rpi = ["inky~=2.4.0"]

[project.scripts]
inky-image-display-controller = "inky_image_display_controller.main:app"

[tool.uv.sources]
inky-image-display-shared = { workspace = true }

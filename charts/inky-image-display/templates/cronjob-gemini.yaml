{{- if .Values.sync.gemini.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "inky-image-display.fullname" . }}-sync-gemini
  labels:
    {{- include "inky-image-display.selectorLabels" (dict "ctx" . "component" "sync-gemini") | nindent 4 }}
    {{- include "inky-image-display.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.sync.gemini.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            {{- include "inky-image-display.selectorLabels" (dict "ctx" . "component" "sync-gemini") | nindent 12 }}
        spec:
          restartPolicy: OnFailure
          securityContext:
            {{- toYaml .Values.podSecurityContext | nindent 12 }}
          containers:
            - name: sync
              image: {{ include "inky-image-display.syncImage" . }}
              imagePullPolicy: {{ .Values.sync.image.pullPolicy }}
              args: ["gemini"]
              env:
                - name: DISPLAY_API_BASE_URL
                  value: {{ include "inky-image-display.syncApiBaseUrl" . | quote }}
                - name: GEMINI_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ required "existingSecrets.gemini is required when sync.gemini.enabled" .Values.existingSecrets.gemini }}
                      key: gemini-api-key
                {{- include "inky-image-display.syncApiTokenEnv" . | nindent 16 }}
                {{- include "inky-image-display.syncS3Env" . | nindent 16 }}
              securityContext:
                {{- toYaml .Values.containerSecurityContext | nindent 16 }}
              resources:
                {{- toYaml .Values.sync.resources | nindent 16 }}
{{- end }}

apiVersion: v1
kind: Service
metadata:
  name: {{ include "inky-image-display.fullname" . }}-api
  labels:
    {{- include "inky-image-display.selectorLabels" (dict "ctx" . "component" "api") | nindent 4 }}
    {{- include "inky-image-display.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "inky-image-display.selectorLabels" (dict "ctx" . "component" "api") | nindent 4 }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http

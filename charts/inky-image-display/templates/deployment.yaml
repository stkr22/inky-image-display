apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "inky-image-display.fullname" . }}-api
  labels:
    {{- include "inky-image-display.selectorLabels" (dict "ctx" . "component" "api") | nindent 4 }}
    {{- include "inky-image-display.labels" . | nindent 4 }}
spec:
  # Must stay a singleton: SQLite over RWO storage, plus the in-process
  # rotation/MOTD scheduler and MQTT client assume a single instance.
  # Recreate avoids two pods contending for the volume during upgrades.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "inky-image-display.selectorLabels" (dict "ctx" . "component" "api") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "inky-image-display.selectorLabels" (dict "ctx" . "component" "api") | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: api
          image: {{ include "inky-image-display.apiImage" . }}
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          env:
            - name: API_DATABASE_PATH
              value: {{ .Values.config.databasePath | quote }}
            - name: API_S3_ENDPOINT
              value: {{ required "config.s3.endpoint is required" .Values.config.s3.endpoint | quote }}
            - name: API_S3_BUCKET
              value: {{ .Values.config.s3.bucket | quote }}
            - name: API_S3_SECURE
              value: {{ .Values.config.s3.secure | quote }}
            {{- with .Values.config.s3.region }}
            - name: API_S3_REGION
              value: {{ . | quote }}
            {{- end }}
            - name: API_DEFAULT_DISPLAY_DURATION
              value: {{ .Values.config.defaultDisplayDuration | quote }}
            - name: API_MQTT_HOST
              value: {{ required "config.mqtt.host is required" .Values.config.mqtt.host | quote }}
            - name: API_MQTT_PORT
              value: {{ .Values.config.mqtt.port | quote }}
            # Advertised to controllers in the registration response —
            # usually the public broker address, not the in-cluster one.
            - name: API_DEVICE_MQTT_HOST
              value: {{ required "config.deviceMqtt.host is required" .Values.config.deviceMqtt.host | quote }}
            - name: API_DEVICE_MQTT_PORT
              value: {{ .Values.config.deviceMqtt.port | quote }}
            - name: API_DEVICE_MQTT_TLS
              value: {{ .Values.config.deviceMqtt.tls | quote }}
            - name: API_DEVICE_MQTT_TRANSPORT
              value: {{ .Values.config.deviceMqtt.transport | quote }}
            - name: API_DEVICE_MQTT_WEBSOCKET_PATH
              value: {{ .Values.config.deviceMqtt.websocketPath | quote }}
            - name: API_S3_WRITER_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ required "existingSecrets.s3Writer is required" .Values.existingSecrets.s3Writer }}
                  key: access-key-id
            - name: API_S3_WRITER_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ required "existingSecrets.s3Writer is required" .Values.existingSecrets.s3Writer }}
                  key: secret-access-key
            - name: API_S3_READER_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ required "existingSecrets.s3Reader is required" .Values.existingSecrets.s3Reader }}
                  key: access-key-id
            - name: API_S3_READER_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ required "existingSecrets.s3Reader is required" .Values.existingSecrets.s3Reader }}
                  key: secret-access-key
            {{- if .Values.existingSecrets.gemini }}
            # Enables POST /api/genai/generate and the message-of-the-day
            # feature (story text + illustration are generated by the API
            # itself; MOTD scheduling runs in-process, no extra CronJob).
            # optional: the Secret may be created later; without it the GenAI
            # endpoints return 503 and everything else works.
            - name: API_GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecrets.gemini }}
                  key: gemini-api-key
                  optional: true
            {{- end }}
            {{- if .Values.config.immich.baseUrl }}
            # Read-only Immich browse proxy: gives the web UI's sync-job
            # filters name-based pickers instead of raw IDs.
            - name: API_IMMICH_BASE_URL
              value: {{ .Values.config.immich.baseUrl | quote }}
            - name: API_IMMICH_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ required "existingSecrets.immich is required when config.immich.baseUrl is set" .Values.existingSecrets.immich }}
                  key: apiKey
            {{- end }}
            {{- if .Values.config.auth.oidcIssuer }}
            # Setting the issuer + client id turns auth enforcement on:
            # humans sign in via OIDC, machine callers need the tokens from
            # existingSecrets.auth. See docs/auth.md.
            - name: API_OIDC_ISSUER
              value: {{ .Values.config.auth.oidcIssuer | quote }}
            - name: API_OIDC_CLIENT_ID
              value: {{ required "config.auth.oidcClientId is required when config.auth.oidcIssuer is set" .Values.config.auth.oidcClientId | quote }}
            - name: API_PUBLIC_BASE_URL
              value: {{ required "config.auth.publicBaseUrl is required when config.auth.oidcIssuer is set" .Values.config.auth.publicBaseUrl | quote }}
            {{- end }}
            {{- if .Values.existingSecrets.auth }}
            # All keys optional in the Secret: a missing session-secret means
            # sessions/invites do not survive restarts, missing tokens leave
            # the corresponding machine caller locked out while auth is on.
            - name: API_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecrets.auth }}
                  key: session-secret
                  optional: true
            - name: API_SYNC_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecrets.auth }}
                  key: sync-token
                  optional: true
            - name: API_DEVICE_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecrets.auth }}
                  key: device-token
                  optional: true
            - name: API_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecrets.auth }}
                  key: oidc-client-secret
                  optional: true
            {{- end }}
            {{- with .Values.api.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim | default (printf "%s-data" (include "inky-image-display.fullname" .)) }}
          {{- else }}
          emptyDir: {}
          {{- end }}
